<div class="projects-grid">
  @for (project of projects(); track project.title; let i = $index) {
    <article class="project-card glass-card" appScrollReveal [revealDelay]="110 * i">
      <div class="project-media">
        <img [src]="project.image" [alt]="project.title">
      </div>

      <div class="project-body">
        <p class="project-subtitle">{{ project.subtitle }}</p>
        <h3>{{ project.title }}</h3>
        <p class="project-description">{{ project.description }}</p>

        <div class="project-tags">
          @for (tag of project.stack; track tag) {
            <span>{{ tag }}</span>
          }
        </div>

        <a
          class="project-link"
          [href]="project.href"
          [attr.target]="project.href.startsWith('http') ? '_blank' : null"
          [attr.rel]="project.href.startsWith('http') ? 'noreferrer' : null">
          Explore project
        </a>
      </div>
    </article>
  }
</div>
